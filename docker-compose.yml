# ==========================================
# CodeSpectra - Docker Compose Configuration
# ==========================================

services:
  # ==========================================
  # DATABASE LAYER
  # ==========================================
  
  # PostgreSQL Database
  postgresql:
    image: postgres:14-alpine
    container_name: codespectra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-codespectra_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - codespectra_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-codespectra_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      

  # pgAdmin - Database Management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: codespectra_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@codespectra.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - codespectra_network
    depends_on:
      - postgresql

  # Redis (for caching & sessions)
  redis:
    image: redis:7-alpine
    container_name: codespectra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - codespectra_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # APPLICATION LAYER
  # ==========================================

  # Node.js Backend (API Gateway)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codespectra_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgresql:5432/${DB_NAME:-codespectra_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ANALYSIS_ENGINE_URL: http://analysis-engine:5000
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    networks:
      - codespectra_network

  # Python Analysis Engine
  analysis-engine:
    build:
      context: ./analysis-engine
      dockerfile: Dockerfile
    container_name: codespectra_analysis
    restart: unless-stopped
    ports:
      - "${ANALYSIS_PORT:-5000}:5000"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgresql:5432/${DB_NAME:-codespectra_db}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
    - ./analysis-engine:/app
    - analysis_workspace:/workspace
    - ./backend/uploads:/app/uploads
    - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - codespectra_network

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: codespectra_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3000}
      VITE_WS_URL: ws://localhost:${BACKEND_PORT:-3000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - codespectra_network

# ==========================================
# VOLUMES
# ==========================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local
  analysis_workspace:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  codespectra_network:
    driver: bridge
    name: codespectra_network